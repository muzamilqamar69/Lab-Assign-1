<!DOCTYPE html>
<html>
<head>
    <title>Art Collection Inventory</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #f5f5f5;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 { 
            text-align: center;
            color: #333;
        }
        .nav {
            text-align: center;
            margin-bottom: 20px;
        }
        .nav a {
            display: inline-block;
            background: #333;
            color: white;
            padding: 8px 15px;
            margin: 0 5px;
            text-decoration: none;
            border: 1px solid #333;
        }
        .nav a:hover {
            background: white;
            color: #333;
        }
        #container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }
        .art-card { 
            background: white;
            padding: 15px;
            border: 1px solid #ddd;
        }
        .art-card h3 {
            margin: 0 0 10px 0;
            color: #333;
        }
        .art-card p {
            margin: 5px 0;
            color: #555;
            font-size: 14px;
        }
        .art-card .label {
            font-weight: bold;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .btn {
            flex: 1;
            padding: 6px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }
        .btn:hover {
            background: #f0f0f0;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .empty {
            text-align: center;
            background: white;
            padding: 40px;
            border: 1px solid #ddd;
            color: #999;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }
        .modal.show {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #ddd;
        }
        .modal-content h2 {
            margin-top: 0;
            color: #333;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            margin-bottom: 3px;
            font-weight: bold;
            font-size: 13px;
        }
        .form-group input {
            width: 100%;
            padding: 6px;
            border: 1px solid #ddd;
            font-family: Arial;
            font-size: 13px;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            background: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
        }
        .modal-buttons button:hover {
            background: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Artwork Gallery</h1>
        
        <div class="nav">
            <a href="/index.html">Home</a>
            <a href="/add.html">Add New Artwork</a>
        </div>

        <div id="container" class="loading">Loading artworks...</div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2>Edit Artwork</h2>
            <form id="editForm">
                <div class="form-group">
                    <label for="editTitle">Title:</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="form-group">
                    <label for="editValue">Value (USD):</label>
                    <input type="number" id="editValue" required step="0.01">
                </div>
                <div class="form-group">
                    <label for="editMedium">Medium:</label>
                    <input type="text" id="editMedium" required>
                </div>
                <div class="modal-buttons">
                    <button type="submit">Save</button>
                    <button type="button" onclick="closeEditModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentEditId = null;

        async function loadArtworks() {
            try {
                const response = await fetch('/api/artworks');
                const data = await response.json();
                const container = document.getElementById('container');
                
                if (data.length === 0) {
                    container.innerHTML = '<div class="empty"><h2>No artworks yet</h2><p><a href="/add.html" style="color: #333; text-decoration: none; font-weight: bold;">Add your first artwork</a></p></div>';
                    return;
                }

                container.innerHTML = '';
                data.forEach(item => {
                    container.innerHTML += `
                        <div class="art-card" data-id="${item._id}">
                            <h3>${item.title}</h3>
                            <p><span class="label">Value:</span> $${parseFloat(item.value).toFixed(2)}</p>
                            <p><span class="label">Medium:</span> ${item.medium}</p>
                            <div class="button-group">
                                <button class="btn" onclick="editArtwork('${item._id}', '${item.title}', ${item.value}, '${item.medium}')">Edit</button>
                                <button class="btn" onclick="deleteArtwork('${item._id}', '${item.title}')">Delete</button>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                document.getElementById('container').innerHTML = `<div class="empty"><p>Error loading artworks: ${error.message}</p></div>`;
            }
        }

        function editArtwork(id, title, value, medium) {
            currentEditId = id;
            document.getElementById('editTitle').value = title;
            document.getElementById('editValue').value = value;
            document.getElementById('editMedium').value = medium;
            document.getElementById('editModal').classList.add('show');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
            currentEditId = null;
        }

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('editTitle').value;
            const value = document.getElementById('editValue').value;
            const medium = document.getElementById('editMedium').value;

            try {
                const response = await fetch(`/api/artworks/${currentEditId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, value, medium })
                });

                if (response.ok) {
                    closeEditModal();
                    loadArtworks();
                    alert('Artwork updated successfully!');
                } else {
                    alert('Error updating artwork');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });

        async function deleteArtwork(id, title) {
            if (confirm(`Are you sure you want to delete "${title}"?`)) {
                try {
                    const response = await fetch(`/api/artworks/${id}`, {
                        method: 'DELETE'
                    });

                    if (response.ok) {
                        alert('Artwork deleted successfully!');
                        loadArtworks();
                    } else {
                        alert('Error deleting artwork');
                    }
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            }
        }

        // Load artworks on page load
        loadArtworks();
    </script>
</body>
</html>
