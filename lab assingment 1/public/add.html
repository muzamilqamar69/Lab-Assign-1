<!DOCTYPE html>
<html>
<head>
    <title>Add New Artwork</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #f5f5f5;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto;
            border: 1px solid #ddd;
        }
        h1 { 
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #333;
            color: white;
            border: 1px solid #333;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background: white;
            color: #333;
        }
        .links {
            text-align: center;
            margin-top: 15px;
        }
        .links a {
            color: #333;
            text-decoration: none;
            margin: 0 10px;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .message {
            padding: 10px;
            margin-bottom: 15px;
            display: none;
            border: 1px solid #ddd;
        }
        .message.success {
            background: #d4edda;
            border-color: #c3e6cb;
        }
        .message.error {
            background: #f8d7da;
            border-color: #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Add New Artwork</h1>
        <div id="message" class="message"></div>

        <form id="artworkForm">
            <div class="form-group">
                <label for="title">Title:</label>
                <input type="text" id="title" name="title" required>
            </div>

            <div class="form-group">
                <label for="value">Value (USD):</label>
                <input type="number" id="value" name="value" required step="0.01">
            </div>

            <div class="form-group">
                <label for="medium">Medium:</label>
                <input type="text" id="medium" name="medium" required>
            </div>

            <button type="submit">Add Artwork</button>
        </form>

        <div class="links">
            <a href="/view.html">View Artworks</a> | 
            <a href="/index.html">Home</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('artworkForm');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('title').value;
            const value = document.getElementById('value').value;
            const medium = document.getElementById('medium').value;

            try {
                const response = await fetch('/api/artworks', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ title, value, medium })
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✓ Artwork added successfully! Redirecting...';
                    form.reset();
                    setTimeout(() => {
                        window.location.href = '/view.html';
                    }, 2000);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '✗ Error: ' + data.error;
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '✗ Error: ' + error.message;
            }
        });
    </script>
</body>
</html>
