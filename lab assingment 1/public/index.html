<!DOCTYPE html>
<html>
<head>
    <title>Art Collection</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #f5f5f5;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border: 1px solid #ddd;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .nav {
            text-align: center;
            margin: 20px 0;
        }
        .nav a {
            display: inline-block;
            background: #333;
            color: white;
            padding: 10px 15px;
            margin: 5px;
            text-decoration: none;
            border: 1px solid #333;
        }
        .nav a:hover {
            background: white;
            color: #333;
        }
        .info-box {
            padding: 20px;
            border: 1px solid #ddd;
            background: #fafafa;
        }
        .info-box p {
            margin: 10px 0;
            line-height: 1.5;
        }
        .code {
            background: #f0f0f0;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Art Collection Manager</h1>
        
        <div class="nav">
            <a href="/index.html">Home</a>
            <a href="/view.html">View Gallery</a>
            <a href="/add.html">Add Artwork</a>
        </div>

        <div class="info-box">
            <h2>Welcome</h2>
            <p>Manage your art collection with full CRUD operations:</p>
            <p>
                • View all artworks<br>
                • Add new items<br>
                • Edit existing items<br>
                • Delete items<br>
            </p>
            <p><strong>API Endpoints:</strong></p>
            <div class="code">
                GET /api/artworks<br>
                POST /api/artworks<br>
                PUT /api/artworks/:id<br>
                DELETE /api/artworks/:id
            </div>
        </div>
    </div>
</body>
</html>
